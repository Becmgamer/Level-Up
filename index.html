<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Level Up Cubos</title>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white;}

header{
background:#020617;
padding:15px;
text-align:center;
font-size:20px;
border-bottom:2px solid #38bdf8;
}

.grid{
display:grid;
grid-template-columns: repeat(auto-fill,minmax(160px,1fr));
gap:12px;
padding:10px;
}

.produto{
background:#020617;
padding:10px;
border-radius:12px;
text-align:center;
}

.produto img{
width:100%;
aspect-ratio:1/1;
border-radius:10px;
object-fit:cover;
}

.preco{color:#38bdf8;font-weight:bold;}

button{
background:#38bdf8;
border:none;
padding:8px;
border-radius:6px;
margin-top:5px;
cursor:pointer;
}

#btnCarrinho{
position:fixed;
top:15px;
right:15px;
z-index:1000;
}

#btnKit{
position:fixed;
bottom:20px;
left:20px;
background:#22c55e;
}

#carrinho{
position:fixed;
right:-100%;
top:0;
width:300px;
height:100%;
background:#020617;
padding:15px;
transition:0.3s;
display:flex;
flex-direction:column;
z-index:1000;
}

#carrinho.ativo{right:0;}

#itens{flex:1;overflow:auto;}

.item{
display:flex;
justify-content:space-between;
margin-bottom:5px;
}

.pagina{display:none;padding:10px;}
.ativa{display:block;}

.voltar{background:#1e293b;margin-bottom:10px;}

input,select{
width:100%;
padding:6px;
margin-top:5px;
border-radius:6px;
border:none;
}
</style>
</head>

<body>

<header>🔥 Level Up Cubos</header>

<button id="btnCarrinho" onclick="toggleCarrinho()">🛒</button>
<button id="btnKit" onclick="abrirKit()">🧩 Kit</button>

<!-- CATÁLOGO -->
<div id="catalogo" class="pagina ativa">
<div class="grid">

<div class="produto">
<img src="https://images.tcdn.com.br/img/img_prod/882922/cubo_magico_3x3x3_moyu_meilong_color_82166132_1_85157428f5bee793492f221aab72bf8f.jpg">
<h3>Cubo Básico</h3>
<p class="preco">R$21.99</p>
<button onclick="ver('basico')">Ver</button>
<button onclick="add('Cubo Básico',21.99)">+</button>
</div>

<div class="produto">
<img src="https://via.placeholder.com/300?text=Cubo+Magnetico">
<h3>Cubo Magnético</h3>
<p class="preco">R$59.90</p>
<button onclick="ver('mag')">Ver</button>
<button onclick="add('Cubo Magnético',59.90)">+</button>
</div>

<div class="produto">
<img src="https://via.placeholder.com/300?text=Bag+Simples">
<h3>Bag</h3>
<p class="preco">R$10</p>
<button onclick="ver('bag')">Ver</button>
<button onclick="add('Bag',10)">+</button>
</div>

<div class="produto">
<img src="https://via.placeholder.com/300?text=Stand">
<h3>Stand</h3>
<p class="preco">R$5</p>
<button onclick="ver('stand')">Ver</button>
<button onclick="add('Stand',5)">+</button>
</div>

<div class="produto">
<img src="https://via.placeholder.com/300?text=Lubrificante">
<h3>Lubrificante</h3>
<p class="preco">R$2</p>
<button onclick="ver('lub')">Ver</button>
<button onclick="add('Lubrificante',2)">+</button>
</div>

</div>
</div>

<!-- PRODUTO -->
<div id="produto" class="pagina">
<button class="voltar" onclick="ir('catalogo')">⬅ Voltar</button>
<div id="info"></div>
</div>

<!-- KIT -->
<div id="kit" class="pagina">
<button class="voltar" onclick="ir('catalogo')">⬅ Voltar</button>

<h2>Montar Kit</h2>

<select id="cubo">
<option value="">Cubo *</option>
<option value="21.99">Básico</option>
<option value="59.90">Magnético</option>
</select>

<select id="bag">
<option value="">Bag *</option>
<option value="10">Simples</option>
</select>

<select id="stand">
<option value="">Stand *</option>
<option value="5">Básico</option>
</select>

<label><input type="checkbox" id="lub"> Lub (+2)</label>

<button onclick="addKit()">Adicionar Kit</button>
</div>

<!-- CARRINHO -->
<div id="carrinho">
<button onclick="toggleCarrinho()">❌</button>

<h2>🛒</h2>
<div id="itens"></div>

<h3>Total: R$ <span id="total">0</span></h3>

<select id="pag">
<option>Pix</option>
<option>Presencial</option>
</select>

<input id="whats" placeholder="WhatsApp">

<button onclick="finalizar()">Finalizar</button>
</div>

<script>

let carrinho=[];
let total=0;

function ir(p){
document.querySelectorAll(".pagina").forEach(e=>e.classList.remove("ativa"));
document.getElementById(p).classList.add("ativa");
}

function toggleCarrinho(){
document.getElementById("carrinho").classList.toggle("ativo");
}

function add(n,p){
carrinho.push({n,p});
total+=p;
update();
}

function update(){
let html="";
carrinho.forEach((i,x)=>{
html+=`<div class="item">
${i.n} R$${i.p}
<button onclick="rem(${x})">❌</button>
</div>`;
});
itens.innerHTML=html;
totalEl.innerText=total.toFixed(2);
}

function rem(i){
total-=carrinho[i].p;
carrinho.splice(i,1);
update();
}

function finalizar(){
if(carrinho.length==0)return alert("Carrinho vazio");
if(!whats.value)return alert("Coloca o WhatsApp");

alert("Pedido enviado!");
carrinho=[];
total=0;
update();
}

function ver(t){
let d={
basico:["Cubo Básico",21.99,"Bom para iniciantes"],
mag:["Cubo Magnético",59.90,"Alta performance"],
bag:["Bag",10,"Proteção"],
stand:["Stand",5,"Exibição"],
lub:["Lubrificante",2,"Mais rápido"]
};

info.innerHTML=`
<img src="https://via.placeholder.com/400" style="width:100%;border-radius:10px;">
<h2>${d[t][0]}</h2>
<p>${d[t][2]}</p>
<h3>R$${d[t][1]}</h3>
<button onclick="add('${d[t][0]}',${d[t][1]})">Adicionar</button>
<button onclick="toggleCarrinho()">Comprar</button>
`;

ir("produto");
}

function abrirKit(){ir("kit");}

function addKit(){
let c=cubo.value,b=bag.value,s=stand.value;
if(!c||!b||!s)return alert("Complete o kit");

let t=Number(c)+Number(b)+Number(s);
if(lub.checked)t+=2;

t*=0.95;

add("Kit",Number(t.toFixed(2)));
ir("catalogo");
}

const itens=document.getElementById("itens");
const totalEl=document.getElementById("total");
const whats=document.getElementById("whats");

</script>

</body>
</html>
