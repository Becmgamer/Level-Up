<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Level Up Cubos</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

/* HEADER */
header {
  background:#020617;
  padding:15px;
  text-align:center;
  font-size:20px;
  border-bottom:2px solid #38bdf8;
}

/* GRID MOBILE */
.grid {
  display:grid;
  grid-template-columns: repeat(2, 1fr);
  gap:12px;
  padding:12px;
}

.produto {
  background:#020617;
  padding:10px;
  border-radius:12px;
}

.produto img {
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:8px;
}

.preco {
  color:#38bdf8;
  font-weight:bold;
}

button {
  background:#38bdf8;
  border:none;
  padding:8px;
  border-radius:6px;
  width:100%;
  margin-top:5px;
}

/* BOTÃO CARRINHO */
#btnCarrinho {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#38bdf8;
  padding:15px;
  border-radius:50%;
  font-size:18px;
}

/* CARRINHO (ESCONDIDO) */
#carrinho {
  position:fixed;
  right:-100%;
  top:0;
  width:85%;
  max-width:320px;
  height:100%;
  background:#020617;
  padding:15px;
  transition:0.3s;
  display:flex;
  flex-direction:column;
}

#carrinho.ativo {
  right:0;
}

#itens {
  flex:1;
  overflow:auto;
}

.item {
  border-bottom:1px solid #333;
  padding:6px 0;
  display:flex;
  justify-content:space-between;
}

input, select {
  width:100%;
  padding:6px;
  margin-top:5px;
  border-radius:6px;
  border:none;
}

/* OVERLAY */
#overlay {
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
}

#overlay.ativo {
  display:block;
}
</style>
</head>

<body>

<header>🔥 Level Up Cubos</header>

<div class="grid">

<div class="produto">
<img src="https://via.placeholder.com/300">
<h4>Cubo Básico</h4>
<p class="preco">R$21.99</p>
<button onclick="add('Cubo Básico',21.99)">+</button>
</div>

<div class="produto">
<img src="https://via.placeholder.com/300">
<h4>Cubo Magnético</h4>
<p class="preco">R$59.90</p>
<button onclick="add('Cubo Magnético',59.90)">+</button>
</div>

<div class="produto">
<img src="https://via.placeholder.com/300">
<h4>Bag Premium</h4>
<p class="preco">R$20</p>
<button onclick="add('Bag Premium',20)">+</button>
</div>

<div class="produto">
<img src="https://via.placeholder.com/300">
<h4>Stand Premium</h4>
<p class="preco">R$10</p>
<button onclick="add('Stand Premium',10)">+</button>
</div>

<div class="produto">
<img src="https://via.placeholder.com/300">
<h4>Lubrificante</h4>
<p class="preco">R$2</p>
<button onclick="add('Lubrificante',2)">+</button>
</div>

</div>

<!-- BOTÃO -->
<div id="btnCarrinho" onclick="abrirCarrinho()">🛒</div>

<div id="overlay" onclick="fecharCarrinho()"></div>

<!-- CARRINHO -->
<div id="carrinho">

<h2>🛒 Carrinho</h2>

<div id="itens"></div>

<h3>Total: R$ <span id="total">0</span></h3>

<select id="pagamento">
<option>Pix</option>
<option>Presencial</option>
</select>

<input id="whats" placeholder="WhatsApp">
<input id="data" placeholder="Data (Presencial)">

<button onclick="finalizar()">Finalizar</button>

</div>

<script>

let carrinho = [];
let total = 0;

function add(nome, preco){
  carrinho.push({nome, preco});
  total += preco;
  atualizar();
}

function atualizar(){
  let html = "";

  carrinho.forEach((item, i)=>{
    html += `
    <div class="item">
      <span>${item.nome}</span>
      <button onclick="remover(${i})">❌</button>
    </div>`;
  });

  document.getElementById("itens").innerHTML = html;
  document.getElementById("total").innerText = total.toFixed(2);
}

function remover(i){
  total -= carrinho[i].preco;
  carrinho.splice(i,1);
  atualizar();
}

function abrirCarrinho(){
  document.getElementById("carrinho").classList.add("ativo");
  document.getElementById("overlay").classList.add("ativo");
}

function fecharCarrinho(){
  document.getElementById("carrinho").classList.remove("ativo");
  document.getElementById("overlay").classList.remove("ativo");
}

function finalizar(){
  if(carrinho.length === 0){
    alert("Carrinho vazio!");
    return;
  }

  alert("Pedido enviado! R$ " + total.toFixed(2));

  carrinho = [];
  total = 0;
  atualizar();
}

</script>

</body>
</html>
