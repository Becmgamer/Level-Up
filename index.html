<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Level Up Cubos</title>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white;}

header{
background:#020617;
padding:15px;
text-align:center;
font-size:20px;
border-bottom:2px solid #38bdf8;
}

.grid{
display:grid;
grid-template-columns: repeat(auto-fill,minmax(180px,1fr));
gap:15px;
padding:10px;
}

.produto{
background:#020617;
padding:10px;
border-radius:12px;
text-align:center;
}

.produto img{
width:100%;
aspect-ratio:1/1;
object-fit:cover;
border-radius:10px;
}

.preco{
color:#38bdf8;
font-weight:bold;
}

button{
background:#38bdf8;
border:none;
padding:8px;
border-radius:6px;
margin-top:5px;
cursor:pointer;
}

#carrinho{
position:fixed;
right:-100%;
top:0;
width:320px;
height:100%;
background:#020617;
padding:15px;
transition:0.3s;
display:flex;
flex-direction:column;
z-index:1000;
}

#carrinho.ativo{right:0;}

#itens{flex:1;overflow:auto;}

.item{
display:flex;
justify-content:space-between;
margin-bottom:5px;
}

#btnCarrinho{
position:fixed;
top:15px;
right:15px;
padding:10px;
border-radius:10px;
}

#btnKit{
position:fixed;
bottom:20px;
left:20px;
background:#22c55e;
padding:12px;
border-radius:10px;
}

.pagina{display:none;padding:10px;}
.ativa{display:block;}

input,select{
width:100%;
padding:6px;
margin-top:5px;
border-radius:6px;
border:none;
}

.voltar{
margin-bottom:10px;
background:#1e293b;
}
</style>
</head>

<body>

<header>🔥 Level Up Cubos</header>

<button id="btnCarrinho" onclick="toggleCarrinho()">🛒</button>
<button id="btnKit" onclick="abrirKit()">🧩 Kit</button>

<!-- CATÁLOGO -->
<div id="catalogo" class="pagina ativa">
<div class="grid">

<div class="produto">
<img src="https://images.tcdn.com.br/img/img_prod/882922/cubo_magico_3x3x3_moyu_meilong_color_82166132_1_85157428f5bee793492f221aab72bf8f.jpg">
<h3>Cubo Básico</h3>
<p class="preco">R$21.99</p>
<button onclick="verProduto('basico')">Ver</button>
<button onclick="add('Cubo Básico',21.99)">Adicionar</button>
</div>

<div class="produto">
<img src="https://via.placeholder.com/300">
<h3>Cubo Magnético</h3>
<p class="preco">R$59.90</p>
<button onclick="verProduto('magnetico')">Ver</button>
<button onclick="add('Cubo Magnético',59.90)">Adicionar</button>
</div>

<div class="produto">
<img src="https://via.placeholder.com/300">
<h3>Bag Simples</h3>
<p class="preco">R$10</p>
<button onclick="verProduto('bag')">Ver</button>
<button onclick="add('Bag Simples',10)">Adicionar</button>
</div>

<div class="produto">
<img src="https://via.placeholder.com/300">
<h3>Bag Premium</h3>
<p class="preco">R$20</p>
<button onclick="verProduto('bagp')">Ver</button>
<button onclick="add('Bag Premium',20)">Adicionar</button>
</div>

<div class="produto">
<img src="https://via.placeholder.com/300">
<h3>Stand Básico</h3>
<p class="preco">R$5</p>
<button onclick="verProduto('stand')">Ver</button>
<button onclick="add('Stand Básico',5)">Adicionar</button>
</div>

<div class="produto">
<img src="https://via.placeholder.com/300">
<h3>Stand Premium</h3>
<p class="preco">R$10</p>
<button onclick="verProduto('standp')">Ver</button>
<button onclick="add('Stand Premium',10)">Adicionar</button>
</div>

<div class="produto">
<img src="https://via.placeholder.com/300">
<h3>Lubrificante</h3>
<p class="preco">R$2</p>
<button onclick="verProduto('lub')">Ver</button>
<button onclick="add('Lubrificante',2)">Adicionar</button>
</div>

</div>
</div>

<!-- PÁGINA PRODUTO -->
<div id="produto" class="pagina">
<button class="voltar" onclick="ir('catalogo')">⬅ Voltar</button>
<div id="produtoInfo"></div>
</div>

<!-- CARRINHO -->
<div id="carrinho">
<button onclick="toggleCarrinho()">❌ Fechar</button>

<h2>🛒 Carrinho</h2>
<div id="itens"></div>

<h3>Total: R$ <span id="total">0</span></h3>

<select id="pagamento">
<option>Pix</option>
<option>Presencial</option>
</select>

<input id="whats" placeholder="WhatsApp">

<button onclick="finalizar()">Finalizar</button>
</div>

<!-- KIT -->
<div id="modalKit" class="pagina">
<button class="voltar" onclick="fecharKit()">⬅ Voltar</button>

<h2>Montar Kit</h2>

<select id="kitCubo">
<option value="">Cubo *</option>
<option value="21.99">Básico</option>
<option value="59.90">Magnético</option>
</select>

<select id="kitBag">
<option value="">Bag *</option>
<option value="10">Simples</option>
<option value="20">Premium</option>
</select>

<select id="kitStand">
<option value="">Stand *</option>
<option value="5">Básico</option>
<option value="10">Premium</option>
</select>

<label><input type="checkbox" id="kitLub"> Lub (+2)</label>

<button onclick="confirmarKit()">Adicionar Kit</button>
</div>

<script>

let carrinho=[];
let total=0;

function ir(p){
document.querySelectorAll(".pagina").forEach(e=>e.classList.remove("ativa"));
document.getElementById(p).classList.add("ativa");
}

function toggleCarrinho(){
document.getElementById("carrinho").classList.toggle("ativo");
}

function add(n,p){
carrinho.push({n,p});
total+=p;
atualizar();
}

function comprarDireto(n,p){
carrinho=[{n,p}];
total=p;
atualizar();
toggleCarrinho();
}

function atualizar(){
let html="";
carrinho.forEach((item,i)=>{
html+=`
<div class="item">
<span>${item.n}</span>
<span>R$ ${item.p}</span>
<button onclick="remover(${i})">❌</button>
</div>`;
});
document.getElementById("itens").innerHTML=html;
document.getElementById("total").innerText=total.toFixed(2);
}

function remover(i){
total-=carrinho[i].p;
carrinho.splice(i,1);
atualizar();
}

function finalizar(){
let whats=document.getElementById("whats").value;

if(carrinho.length==0){alert("Carrinho vazio!");return;}
if(!whats){alert("Preencha o WhatsApp!");return;}

alert("Pedido enviado!");
carrinho=[];
total=0;
atualizar();
}

function verProduto(tipo){

let html="";

function bloco(nome, preco, desc){
return `
<div style="display:flex;gap:20px;flex-wrap:wrap;">
<div style="flex:1;min-width:250px;">
<img src="https://via.placeholder.com/400" style="width:100%;border-radius:10px;">
<p>${desc}</p>
</div>

<div style="flex:1;min-width:200px;">
<h2>${nome}</h2>
<h3>R$${preco}</h3>
<button onclick="comprarDireto('${nome}',${preco})">Comprar</button>
<button onclick="add('${nome}',${preco})">Adicionar</button>
</div>
</div>`;
}

if(tipo==="basico")<img src="https://images.tcdn.com.br/img/img_prod/882922/cubo_magico_3x3x3_moyu_meilong_color_82166132_1_85157428f5bee793492f221aab72bf8f.jpg"> html=bloco("Cubo Básico",21.99,"Ótimo para iniciantes.");
if(tipo==="basico") html=bloco("Cubo Básico",21.99,"Ótimo para iniciantes.");
if(tipo==="basico")html=bloco("Cubo Básico",21.99,"Ótimo para iniciantes.");
if(tipo==="magnetico") html=bloco("Cubo Magnético",59.90,"Alta performance.");
if(tipo==="bag") html=bloco("Bag Simples",10,"Protege seu cubo.");
if(tipo==="bagp") html=bloco("Bag Premium",20,"Mais proteção.");
if(tipo==="stand") html=bloco("Stand Básico",5,"Exibição simples.");
if(tipo==="standp") html=bloco("Stand Premium",10,"Mais resistente.");
if(tipo==="lub") html=bloco("Lubrificante",2,"Deixa mais rápido.");

document.getElementById("produtoInfo").innerHTML=html;
ir("produto");
}

function abrirKit(){ir("modalKit");}
function fecharKit(){ir("catalogo");}

function confirmarKit(){
let c=document.getElementById("kitCubo").value;
let b=document.getElementById("kitBag").value;
let s=document.getElementById("kitStand").value;

if(!c||!b||!s){
alert("Complete os obrigatórios!");
return;
}

let totalKit=Number(c)+Number(b)+Number(s);
if(document.getElementById("kitLub").checked) totalKit+=2;

totalKit*=0.95;

add("Kit Completo",Number(totalKit.toFixed(2)));
alert("Kit com desconto adicionado!");
ir("catalogo");
}

</script>

</body>
</html>
