<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Level Up</title>

<style>
body { margin:0; font-family:Arial; background:#0f172a; color:white; }
header { background:#020617; padding:15px; text-align:center; }
.grid { display:grid; grid-template-columns: repeat(2,1fr); gap:15px; padding:15px; }
.produto { background:#020617; padding:10px; border-radius:10px; text-align:center; }
.produto img { width:100%; border-radius:10px; }
button { background:#38bdf8; border:none; padding:8px; margin-top:5px; border-radius:6px; }
#carrinho { position:fixed; right:0; top:0; width:300px; height:100%; background:#020617; padding:10px; overflow:auto; }
.item { border-bottom:1px solid gray; padding:5px; }
#login { text-align:center; margin-top:50px; }
</style>
</head>

<body>

<header>🔥 Level Up Cubos</header>

<div id="login">
<input id="email" placeholder="Email"><br><br>
<input id="senha" type="password" placeholder="Senha"><br><br>
<button onclick="entrar()">Entrar</button>
</div>

<div id="loja" style="display:none">

<div class="grid">

<div class="produto">
<img src="https://i.postimg.cc/KcH2Ps1v/images-(2).jpg">
   Esta div tem 300px de largura e 300px de altura.
<p>Cubo Básico</p>
<p>R$21.99</p>
<button onclick="add('Cubo Básico',21.99)">Adicionar</button>
</div>

<div class="produto">
<img src="Linkdaimagemaqui">
<p>Cubo Magnético</p>
<p>R$59.90</p>
<button onclick="add('Cubo Magnético',59.90)">Adicionar</button>
</div>

</div>

</div>

<div id="carrinho">
<h2>🛒 Carrinho</h2>
<div id="itens"></div>

<h3>Total: R$ <span id="total">0</span></h3>

<h3>Pagamento</h3>
<select id="pagamento">
<option>Pix</option>
<option>Presencial</option>
</select>

<br><br>
<input id="whats" placeholder="WhatsApp"><br><br>
<input id="data" placeholder="Data"><br><br>

<button onclick="finalizar()">Finalizar</button>
</div>

<script>

let carrinho = [];
let total = 0;

// LOGIN SIMPLES (SEM FIREBASE)
function entrar(){
  document.getElementById("login").style.display="none";
  document.getElementById("loja").style.display="block";
}

// ADD
function add(nome, preco){
  carrinho.push({nome, preco});
  total += preco;
  atualizar();
}

// ATUALIZAR
function atualizar(){
  let html = "";
  carrinho.forEach((item, i)=>{
    html += `
    <div class="item">
      ${item.nome} - R$ ${item.preco}
      <button onclick="remover(${i})">❌</button>
    </div>`;
  });
  document.getElementById("itens").innerHTML = html;
  document.getElementById("total").innerText = total.toFixed(2);
}

// REMOVER
function remover(i){
  total -= carrinho[i].preco;
  carrinho.splice(i,1);
  atualizar();
}

// FINALIZAR
function finalizar(){
  alert("Pedido enviado!\nTotal: R$ "+total.toFixed(2));
  carrinho = [];
  total = 0;
  atualizar();
}

</script>

</body>
</html>
