<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Level Up Cubos</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

/* HEADER */
header{
background:#020617;
padding:15px;
text-align:center;
font-size:20px;
border-bottom:2px solid #38bdf8;
}

/* NAV */
nav{
display:flex;
justify-content:space-around;
background:#020617;
padding:10px;
}

nav button{
background:none;
color:white;
border:none;
font-size:16px;
cursor:pointer;
}

/* PÁGINAS */
.pagina{
display:none;
padding:10px;
}
.ativa{
display:block;
}

/* GRID QUADRADA */
.grid{
display:grid;
grid-template-columns: repeat(auto-fill,minmax(180px,1fr));
gap:15px;
}

.produto{
background:#020617;
border-radius:12px;
padding:10px;
text-align:center;
}

.produto img{
width:100%;
aspect-ratio:1/1;
object-fit:cover;
border-radius:10px;
}

.preco{
color:#38bdf8;
font-weight:bold;
}

/* CARRINHO */
#carrinhoBox{
max-width:400px;
margin:auto;
background:#020617;
padding:15px;
border-radius:10px;
display:flex;
flex-direction:column;
height:70vh;
}

#itens{
flex:1;
overflow:auto;
}

.item{
display:flex;
justify-content:space-between;
margin-bottom:5px;
}

/* FINAL FIXO */
#finalArea{
border-top:1px solid #333;
padding-top:10px;
}

input,select{
width:100%;
padding:6px;
margin-top:5px;
border-radius:6px;
border:none;
}

button{
background:#38bdf8;
border:none;
padding:8px;
border-radius:6px;
margin-top:5px;
cursor:pointer;
}
</style>
</head>

<body>

<header>🔥 Level Up Cubos</header>

<nav>
<button onclick="ir('catalogo')">🛍️ Loja</button>
<button onclick="ir('carrinho')">🛒 Carrinho</button>
<button onclick="ir('kit')">🧩 Kit</button>
</nav>

<!-- CATÁLOGO -->
<div id="catalogo" class="pagina ativa">

<div class="grid">

<div class="produto">
<img src="https://images.tcdn.com.br/img/img_prod/882922/cubo_magico_3x3x3_moyu_meilong_color_82166132_1_85157428f5bee793492f221aab72bf8f.jpg">
<h3>Cubo Básico</h3>
<p class="preco">R$21.99</p>
<button onclick="add('Cubo Básico',21.99)">Adicionar</button>
<button onclick="comprarDireto('Cubo Básico',21.99)">Comprar</button>
</div>

<div class="produto">
<img src="https://via.placeholder.com/300">
<h3>Cubo Magnético</h3>
<p class="preco">R$59.90</p>
<button onclick="add('Cubo Magnético',59.90)">Adicionar</button>
<button onclick="comprarDireto('Cubo Magnético',59.90)">Comprar</button>
</div>

<div class="produto">
<img src="https://via.placeholder.com/300">
<h3>Bag Premium</h3>
<p class="preco">R$20</p>
<button onclick="add('Bag Premium',20)">Adicionar</button>
</div>

<div class="produto">
<img src="https://via.placeholder.com/300">
<h3>Stand Premium</h3>
<p class="preco">R$10</p>
<button onclick="add('Stand Premium',10)">Adicionar</button>
</div>

<div class="produto">
<img src="https://via.placeholder.com/300">
<h3>Lubrificante</h3>
<p class="preco">R$2</p>
<button onclick="add('Lubrificante',2)">Adicionar</button>
</div>

</div>

</div>

<!-- CARRINHO -->
<div id="carrinho" class="pagina">

<div id="carrinhoBox">

<h2>🛒 Carrinho</h2>

<div id="itens"></div>

<div id="finalArea">

<h3>Total: R$ <span id="total">0</span></h3>

<select id="pagamento">
<option>Pix</option>
<option>Presencial</option>
</select>

<input id="whats" placeholder="WhatsApp">

<button onclick="finalizar()">Finalizar Pedido</button>

</div>

</div>

</div>

<!-- KIT -->
<div id="kit" class="pagina">

<h2>Montar Kit</h2>

<select id="kitCubo">
<option value="">Cubo *</option>
<option value="21.99">Básico</option>
<option value="59.90">Magnético</option>
</select>

<select id="kitBag">
<option value="">Bag *</option>
<option value="10">Simples</option>
<option value="20">Premium</option>
</select>

<select id="kitStand">
<option value="">Stand *</option>
<option value="5">Básico</option>
<option value="10">Premium</option>
</select>

<label><input type="checkbox" id="kitLub"> Lub (+2)</label>

<button onclick="confirmarKit()">Adicionar Kit</button>

</div>

<script>

let carrinho=[];
let total=0;

/* TROCAR PÁGINA */
function ir(p){
document.querySelectorAll(".pagina").forEach(e=>e.classList.remove("ativa"));
document.getElementById(p).classList.add("ativa");
}

/* ADD */
function add(n,p){
carrinho.push({n,p});
total+=p;
atualizar();
}

/* COMPRAR DIRETO */
function comprarDireto(n,p){
carrinho=[{n,p}];
total=p;
atualizar();
ir("carrinho");
}

/* ATUALIZAR */
function atualizar(){
let html="";
carrinho.forEach((item,i)=>{
html+=`
<div class="item">
<span>${item.n}</span>
<span>R$ ${item.p}</span>
<button onclick="remover(${i})">❌</button>
</div>`;
});
document.getElementById("itens").innerHTML=html;
document.getElementById("total").innerText=total.toFixed(2);
}

/* REMOVER */
function remover(i){
total-=carrinho[i].p;
carrinho.splice(i,1);
atualizar();
}

/* FINALIZAR */
function finalizar(){

let whats=document.getElementById("whats").value;

if(carrinho.length==0){
alert("Carrinho vazio!");
return;
}

if(!whats){
alert("Preencha o WhatsApp!");
return;
}

alert("Pedido enviado! Total: R$ "+total.toFixed(2));

carrinho=[];
total=0;
atualizar();
}

/* KIT */
function confirmarKit(){

let c=document.getElementById("kitCubo").value;
let b=document.getElementById("kitBag").value;
let s=document.getElementById("kitStand").value;

if(!c||!b||!s){
alert("Complete os obrigatórios!");
return;
}

let totalKit=Number(c)+Number(b)+Number(s);

if(document.getElementById("kitLub").checked) totalKit+=2;

/* DESCONTO */
totalKit*=0.95;

add("Kit Completo",Number(totalKit.toFixed(2)));

alert("Kit adicionado com 5% OFF!");
}

</script>

</body>
</html>
