<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Level Up Cubos</title>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white;}

header{
background:#020617;
padding:15px;
text-align:center;
font-size:20px;
border-bottom:2px solid #38bdf8;
}

.grid{
display:grid;
grid-template-columns: repeat(auto-fill,minmax(160px,1fr));
gap:12px;
padding:10px;
}

.produto{
background:#020617;
padding:10px;
border-radius:12px;
text-align:center;
}

.produto img{
width:100%;
aspect-ratio:1/1;
border-radius:10px;
object-fit:cover;
}

.preco{color:#38bdf8;font-weight:bold;}

button{
background:#38bdf8;
border:none;
padding:8px;
border-radius:6px;
margin-top:5px;
cursor:pointer;
}

#btnCarrinho{
position:fixed;
top:15px;
right:15px;
z-index:1000;
}

#btnKit{
position:fixed;
bottom:20px;
left:20px;
background:#22c55e;
}

#carrinho{
position:fixed;
right:-100%;
top:0;
width:300px;
height:100%;
background:#020617;
padding:15px;
transition:0.3s;
display:flex;
flex-direction:column;
z-index:1000;
}

#carrinho.ativo{right:0;}

#itens{flex:1;overflow:auto;}

.item{
display:flex;
justify-content:space-between;
margin-bottom:5px;
}

.pagina{display:none;padding:10px;}
.ativa{display:block;}

.voltar{background:#1e293b;margin-bottom:10px;}

input,select{
width:100%;
padding:6px;
margin-top:5px;
border-radius:6px;
border:none;
}
</style>
</head>

<body>

<header>🔥 Level Up Cubos</header>

<button id="btnCarrinho" onclick="toggleCarrinho()">🛒</button>
<button id="btnKit" onclick="abrirKit()">🧩 Kit</button>

<script>

let carrinho=[];
let total=0;

function ir(p){
document.querySelectorAll(".pagina").forEach(e=>e.classList.remove("ativa"));
document.getElementById(p).classList.add("ativa");
}

function toggleCarrinho(){
document.getElementById("carrinho").classList.toggle("ativo");
}

function add(n,p){
carrinho.push({n,p});
total+=p;
update();
}

function update(){
let html="";
carrinho.forEach((i,x)=>{
html+=`<div class="item">
${i.n} R$${i.p}
<button onclick="rem(${x})">❌</button>
</div>`;
});
itens.innerHTML=html;
totalEl.innerText=total.toFixed(2);
}

function rem(i){
total-=carrinho[i].p;
carrinho.splice(i,1);
update();
}

function finalizar(){
if(carrinho.length==0)return alert("Carrinho vazio");
if(!whats.value)return alert("Coloca o WhatsApp");

alert("Pedido enviado!");
carrinho=[];
total=0;
update();
}
