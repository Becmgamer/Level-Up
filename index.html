<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Level Up Cubos</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

/* HEADER */
header{
background:#020617;
padding:15px;
text-align:center;
font-size:20px;
border-bottom:2px solid #38bdf8;
}

/* BOTÃO CARRINHO */
#abrirCarrinho{
position:fixed;
top:15px;
right:15px;
background:#38bdf8;
padding:10px;
border-radius:10px;
cursor:pointer;
z-index:1000;
}

/* GRID MOBILE */
.grid{
display:grid;
grid-template-columns: repeat(2,1fr);
gap:10px;
padding:10px;
}

.produto{
background:#020617;
padding:10px;
border-radius:10px;
}

.produto img{
width:100%;
height:100px;
object-fit:cover;
border-radius:8px;
}

.preco{
color:#38bdf8;
font-weight:bold;
}

button{
background:#38bdf8;
border:none;
padding:8px;
border-radius:6px;
cursor:pointer;
width:100%;
margin-top:5px;
}

/* CARRINHO */
#carrinho{
position:fixed;
right:-100%;
top:0;
width:85%;
max-width:320px;
height:100%;
background:#020617;
padding:15px;
transition:0.3s;
display:flex;
flex-direction:column;
z-index:999;
}

#carrinho.ativo{
right:0;
}

/* FECHAR */
#fechar{
background:red;
width:auto;
align-self:flex-end;
}

/* OVERLAY */
#overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
}

#overlay.ativo{
display:block;
}

#itens{
flex:1;
overflow:auto;
}

.item{
display:flex;
justify-content:space-between;
margin-bottom:5px;
font-size:14px;
}

/* INPUT */
input, select{
width:100%;
padding:6px;
margin-top:5px;
border-radius:6px;
border:none;
}

/* KIT BOTÃO */
#kitBtn{
position:fixed;
bottom:20px;
left:20px;
background:#22c55e;
width:auto;
padding:12px;
}

/* MODAIS */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
}

.modalContent{
background:#020617;
padding:20px;
border-radius:10px;
width:300px;
}
</style>
</head>

<body>

<header>🔥 Level Up Cubos</header>

<div id="abrirCarrinho" onclick="abrirCarrinho()">🛒</div>

<!-- PRODUTOS -->
<div class="grid">

<div class="produto">
<img src="https://via.placeholder.com/300">
<h3>Cubo Básico</h3>
<p class="preco">R$21.99</p>
<button onclick="add('Cubo Básico',21.99)">Adicionar</button>
</div>

<div class="produto">
<img src="https://via.placeholder.com/300">
<h3>Cubo Magnético</h3>
<p class="preco">R$59.90</p>
<button onclick="add('Cubo Magnético',59.90)">Adicionar</button>
</div>

<div class="produto">
<img src="https://via.placeholder.com/300">
<h3>Bag Simples</h3>
<p class="preco">R$10</p>
<button onclick="add('Bag Simples',10)">Adicionar</button>
</div>

<div class="produto">
<img src="https://via.placeholder.com/300">
<h3>Bag Premium</h3>
<p class="preco">R$20</p>
<button onclick="add('Bag Premium',20)">Adicionar</button>
</div>

<div class="produto">
<img src="https://via.placeholder.com/300">
<h3>Stand Básico</h3>
<p class="preco">R$5</p>
<button onclick="add('Stand Básico',5)">Adicionar</button>
</div>

<div class="produto">
<img src="https://via.placeholder.com/300">
<h3>Stand Premium</h3>
<p class="preco">R$10</p>
<button onclick="add('Stand Premium',10)">Adicionar</button>
</div>

<div class="produto">
<img src="https://via.placeholder.com/300">
<h3>Lubrificante</h3>
<p class="preco">R$2</p>
<button onclick="add('Lubrificante',2)">Adicionar</button>
</div>

</div>

<!-- BOTÃO KIT -->
<button id="kitBtn" onclick="abrirKit()">🧩 Montar meu Kit</button>

<!-- OVERLAY -->
<div id="overlay" onclick="fecharCarrinho()"></div>

<!-- CARRINHO -->
<div id="carrinho">

<button id="fechar" onclick="fecharCarrinho()">✖</button>

<h2>🛒 Carrinho</h2>

<div id="itens"></div>

<h3>Total: R$ <span id="total">0</span></h3>

<select id="pagamento">
<option>Pix</option>
<option>Presencial</option>
</select>

<input id="whats" placeholder="WhatsApp">
<input id="data" placeholder="Data (Presencial)">

<button onclick="finalizar()">Finalizar</button>

</div>

<!-- KIT -->
<div id="modalKit" class="modal">
<div class="modalContent">

<h3>Montar Kit</h3>

<select id="kitCubo">
<option value="">Cubo *</option>
<option value="21.99">Básico</option>
<option value="59.90">Magnético</option>
</select>

<select id="kitBag">
<option value="">Bag *</option>
<option value="10">Simples</option>
<option value="20">Premium</option>
</select>

<select id="kitStand">
<option value="">Stand *</option>
<option value="5">Básico</option>
<option value="10">Premium</option>
</select>

<label><input type="checkbox" id="kitLub"> Lub (+2)</label><br>

<button onclick="confirmarKit()">Adicionar</button>
<button onclick="fecharKit()">Fechar</button>

</div>
</div>

<!-- PIX -->
<div id="modalPix" class="modal">
<div class="modalContent">

<h3>Pagamento PIX</h3>

<img src="https://via.placeholder.com/200">

<input id="pix" value="SUA_CHAVE_PIX_AQUI" readonly>
<button onclick="copiarPix()">Copiar</button>

<button onclick="fecharPix()">Fechar</button>

</div>
</div>

<script>

let carrinho=[];
let total=0;

/* CARRINHO */
function abrirCarrinho(){
carrinhoUI(true);
}
function fecharCarrinho(){
carrinhoUI(false);
}
function carrinhoUI(v){
document.getElementById("carrinho").classList.toggle("ativo",v);
document.getElementById("overlay").classList.toggle("ativo",v);
}

/* ADD */
function add(n,p){
carrinho.push({n,p});
total+=p;
atualizar();
}

/* ATUALIZAR */
function atualizar(){
let html="";
carrinho.forEach((item,i)=>{
html+=`
<div class="item">
<span>${item.n}</span>
<span>R$ ${item.p}</span>
<button onclick="remover(${i})">❌</button>
</div>`;
});
document.getElementById("itens").innerHTML=html;
document.getElementById("total").innerText=total.toFixed(2);
}

/* REMOVER */
function remover(i){
total-=carrinho[i].p;
carrinho.splice(i,1);
atualizar();
}

/* FINALIZAR */
function finalizar(){

let whats=document.getElementById("whats").value;
let pagamento=document.getElementById("pagamento").value;

if(carrinho.length==0){
alert("Carrinho vazio!");
return;
}

if(!whats){
alert("Preencha o WhatsApp!");
return;
}

if(pagamento=="Pix"){
document.getElementById("modalPix").style.display="flex";
return;
}

alert("Pedido enviado!");
limpar();
}

function limpar(){
carrinho=[];
total=0;
atualizar();
}

/* PIX */
function copiarPix(){
let p=document.getElementById("pix");
p.select();
document.execCommand("copy");
alert("Copiado!");
}
function fecharPix(){
document.getElementById("modalPix").style.display="none";
}

/* KIT */
function abrirKit(){
document.getElementById("modalKit").style.display="flex";
}
function fecharKit(){
document.getElementById("modalKit").style.display="none";
}

function confirmarKit(){

let c=document.getElementById("kitCubo").value;
let b=document.getElementById("kitBag").value;
let s=document.getElementById("kitStand").value;

if(!c||!b||!s){
alert("Complete os obrigatórios!");
return;
}

let totalKit=Number(c)+Number(b)+Number(s);

if(document.getElementById("kitLub").checked) totalKit+=2;

/* DESCONTO */
totalKit*=0.95;

add("Kit Completo",Number(totalKit.toFixed(2)));

fecharKit();
}

</script>

</body>
</html>
