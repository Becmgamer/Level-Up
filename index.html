<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Level Up Cubos</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

header {
  background:#020617;
  padding:20px;
  text-align:center;
  font-size:24px;
  border-bottom:2px solid #38bdf8;
}

/* BOTÃO ABRIR CARRINHO */
#abrirCarrinho {
  position:fixed;
  top:20px;
  right:20px;
  background:#38bdf8;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
  z-index:1000;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(160px,1fr));
  gap:15px;
  padding:15px;
}

.produto {
  background:#020617;
  padding:10px;
  border-radius:12px;
  transition:0.3s;
}

.produto img {
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:8px;
}

.preco {
  color:#38bdf8;
  font-weight:bold;
}

button {
  background:#38bdf8;
  border:none;
  padding:8px;
  border-radius:6px;
  cursor:pointer;
  width:100%;
  margin-top:5px;
}

/* CARRINHO (OCULTO) */
#carrinho {
  position:fixed;
  right:-100%;
  top:0;
  width:300px;
  height:100%;
  background:#020617;
  padding:15px;
  transition:0.3s;
  z-index:999;
  display:flex;
  flex-direction:column;
}

#carrinho.ativo {
  right:0;
}

/* BOTÃO FECHAR */
#fecharCarrinhoBtn {
  background:red;
  color:white;
  border:none;
  padding:8px;
  border-radius:6px;
  width:auto;
  align-self:flex-end;
  margin-bottom:10px;
}

/* OVERLAY */
#overlay {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
}

#overlay.ativo {
  display:block;
}

#itens {
  flex:1;
  overflow:auto;
}

.item {
  display:flex;
  justify-content:space-between;
  margin-bottom:5px;
}

input, select {
  width:100%;
  padding:6px;
  margin-top:5px;
  border-radius:6px;
  border:none;
}
</style>
</head>
