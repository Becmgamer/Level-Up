<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Level Up Cubos</title>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white;}

header{
background:#020617;
padding:15px;
text-align:center;
font-size:20px;
border-bottom:2px solid #38bdf8;
}

.grid{
display:grid;
grid-template-columns: repeat(auto-fill,minmax(160px,1fr));
gap:12px;
padding:10px;
}

.produto{
background:#020617;
padding:10px;
border-radius:12px;
text-align:center;
}

.produto img{
width:100%;
aspect-ratio:1/1;
border-radius:10px;
object-fit:cover;
}

.preco{color:#38bdf8;font-weight:bold;}

button{
background:#38bdf8;
border:none;
padding:8px;
border-radius:6px;
margin-top:5px;
cursor:pointer;
}

#btnCarrinho{
position:fixed;
top:15px;
right:15px;
z-index:1000;
}

#carrinho{
position:fixed;
right:-100%;
top:0;
width:300px;
height:100%;
background:#020617;
padding:15px;
transition:0.3s;
display:flex;
flex-direction:column;
}

#carrinho.ativo{right:0;}

#itens{flex:1;overflow:auto;}

.item{
display:flex;
justify-content:space-between;
margin-bottom:5px;
}

.pagina{display:none;padding:10px;}
.ativa{display:block;}

.voltar{background:#1e293b;margin-bottom:10px;}

input{
width:100%;
padding:6px;
margin-top:5px;
border-radius:6px;
border:none;
}
</style>
</head>

<body>

<header>🔥 Level Up Cubos</header>

<button id="btnCarrinho" onclick="toggleCarrinho()">🛒</button>

<!-- CATÁLOGO -->
<div id="catalogo" class="pagina ativa">
<div class="grid">

<div class="produto">
<img src="https://via.placeholder.com/300?text=Moyu+3C">
<h3>Moyu 3C</h3>
<p class="preco">R$29,99</p>
<button onclick="ver('3c')">Ver</button>
<button onclick="add('Moyu 3C',29.99)">+</button>
</div>

<div class="produto">
<img src="https://via.placeholder.com/300?text=Moyu+3MV2">
<h3>Moyu 3MV2</h3>
<p class="preco">R$64,90</p>
<button onclick="ver('3mv2')">Ver</button>
<button onclick="add('Moyu 3MV2',64.90)">+</button>
</div>

<div class="produto">
<img src="https://via.placeholder.com/300?text=Bag+Simples">
<h3>Bag Simples</h3>
<p class="preco">R$20,00</p>
<button onclick="ver('bag1')">Ver</button>
<button onclick="add('Bag Simples',20)">+</button>
</div>

<div class="produto">
<img src="https://via.placeholder.com/300?text=Bag+GAN">
<h3>Bag GAN</h3>
<p class="preco">R$40,00</p>
<button onclick="ver('bag2')">Ver</button>
<button onclick="add('Bag GAN',40)">+</button>
</div>

<div class="produto">
<img src="https://via.placeholder.com/300?text=Stand+Basico">
<h3>Stand Básico</h3>
<p class="preco">R$5,00</p>
<button onclick="ver('stand1')">Ver</button>
<button onclick="add('Stand Básico',5)">+</button>
</div>

<div class="produto">
<img src="https://via.placeholder.com/300?text=Stand+Giratorio">
<h3>Stand Giratório</h3>
<p class="preco">R$20,00</p>
<button onclick="ver('stand2')">Ver</button>
<button onclick="add('Stand Giratório',20)">+</button>
</div>

<div class="produto">
<img src="https://via.placeholder.com/300?text=Lubrificante">
<h3>Lubrificante</h3>
<p class="preco">R$25,00</p>
<button onclick="ver('lub')">Ver</button>
<button onclick="add('Lubrificante',25)">+</button>
</div>

</div>
</div>

<!-- PRODUTO -->
<div id="produto" class="pagina">
<button class="voltar" onclick="ir('catalogo')">⬅ Voltar</button>
<div id="info"></div>
</div>

<!-- CARRINHO -->
<div id="carrinho">
<button onclick="toggleCarrinho()">❌</button>

<h2>🛒 Carrinho</h2>
<div id="itens"></div>

<h3>Total: R$ <span id="total">0</span></h3>

<input id="whats" placeholder="WhatsApp">

<button onclick="finalizar()">Finalizar</button>
</div>

<script>

let carrinho=[];
let total=0;

function ir(p){
document.querySelectorAll(".pagina").forEach(e=>e.classList.remove("ativa"));
document.getElementById(p).classList.add("ativa");
}

function toggleCarrinho(){
document.getElementById("carrinho").classList.toggle("ativo");
}

function add(n,p){
carrinho.push({n,p});
total+=p;
update();
}

function update(){
let html="";
carrinho.forEach((i,x)=>{
html+=`<div class="item">
${i.n} R$${i.p}
<button onclick="rem(${x})">❌</button>
</div>`;
});
itens.innerHTML=html;
totalEl.innerText=total.toFixed(2);
}

function rem(i){
total-=carrinho[i].p;
carrinho.splice(i,1);
update();
}

function finalizar(){
if(carrinho.length==0)return alert("Carrinho vazio");
if(!whats.value)return alert("Coloca o WhatsApp");

alert("Pedido enviado!");
carrinho=[];
total=0;
update();
}

function ver(t){

let d={
"3c":["Moyu 3C",29.99,"Descrição aqui depois você troca","https://via.placeholder.com/400"],
"3mv2":["Moyu 3MV2",64.90,"Descrição aqui depois você troca","https://via.placeholder.com/400"],
"bag1":["Bag Simples",20,"Descrição aqui depois você troca","https://via.placeholder.com/400"],
"bag2":["Bag GAN",40,"Descrição aqui depois você troca","https://via.placeholder.com/400"],
"stand1":["Stand Básico",5,"Descrição aqui depois você troca","https://via.placeholder.com/400"],
"stand2":["Stand Giratório",20,"Descrição aqui depois você troca","https://via.placeholder.com/400"],
"lub":["Lubrificante",25,"Descrição aqui depois você troca","https://via.placeholder.com/400"]
};

info.innerHTML=`
<div style="display:flex;flex-wrap:wrap;gap:20px;">

<div style="flex:1;">
<img src="${d[t][3]}" style="width:100%;max-width:400px;border-radius:12px;">
</div>

<div style="flex:1;display:flex;flex-direction:column;gap:10px;">

<h2>${d[t][0]}</h2>
<h1 style="color:#38bdf8;">R$${d[t][1]}</h1>
<p>${d[t][2]}</p>

<button onclick="add('${d[t][0]}',${d[t][1]})">Adicionar</button>
<button onclick="add('${d[t][0]}',${d[t][1]}); toggleCarrinho();">Comprar</button>

</div>

</div>
`;

ir("produto");
}

const itens=document.getElementById("itens");
const totalEl=document.getElementById("total");
const whats=document.getElementById("whats");

</script>

</body>
</html>
