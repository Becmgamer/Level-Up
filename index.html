<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Level Up Cubos</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

/* HEADER */
header{
background:#020617;
padding:15px;
text-align:center;
font-size:20px;
border-bottom:2px solid #38bdf8;
}

/* GRID */
.grid{
display:grid;
grid-template-columns: repeat(auto-fill,minmax(180px,1fr));
gap:15px;
padding:10px;
}

.produto{
background:#020617;
padding:10px;
border-radius:12px;
text-align:center;
}

.produto img{
width:100%;
aspect-ratio:1/1;
object-fit:cover;
border-radius:10px;
}

.preco{
color:#38bdf8;
font-weight:bold;
}

/* BOTÕES */
button{
background:#38bdf8;
border:none;
padding:8px;
border-radius:6px;
margin-top:5px;
cursor:pointer;
}

/* CARRINHO LATERAL */
#carrinho{
position:fixed;
right:-100%;
top:0;
width:320px;
height:100%;
background:#020617;
padding:15px;
transition:0.3s;
display:flex;
flex-direction:column;
z-index:1000;
}

#carrinho.ativo{
right:0;
}

#itens{
flex:1;
overflow:auto;
}

.item{
display:flex;
justify-content:space-between;
margin-bottom:5px;
}

/* BOTÃO CARRINHO */
#btnCarrinho{
position:fixed;
top:15px;
right:15px;
background:#38bdf8;
padding:10px;
border-radius:10px;
}

/* BOTÃO KIT */
#btnKit{
position:fixed;
bottom:20px;
left:20px;
background:#22c55e;
padding:12px;
border-radius:10px;
}

/* PÁGINAS */
.pagina{
display:none;
padding:10px;
}
.ativa{
display:block;
}

/* INPUT */
input,select{
width:100%;
padding:6px;
margin-top:5px;
border-radius:6px;
border:none;
}

/* VOLTAR */
.voltar{
margin-bottom:10px;
background:#1e293b;
}
</style>
</head>

<body>

<header>🔥 Level Up Cubos</header>

<button id="btnCarrinho" onclick="toggleCarrinho()">🛒</button>
<button id="btnKit" onclick="abrirKit()">🧩 Kit</button>

<!-- CATÁLOGO -->
<div id="catalogo" class="pagina ativa">

<div class="grid">

<div class="produto">
<img src="https://via.placeholder.com/300">
<h3>Cubo Básico</h3>
<p class="preco">R$21.99</p>
<button onclick="verProduto('basico')">Ver</button>
<button onclick="add('Cubo Básico',21.99)">Adicionar</button>
</div>

<div class="produto">
<img src="https://via.placeholder.com/300">
<h3>Cubo Magnético</h3>
<p class="preco">R$59.90</p>
<button onclick="verProduto('magnetico')">Ver</button>
<button onclick="add('Cubo Magnético',59.90)">Adicionar</button>
</div>

</div>

</div>

<!-- PÁGINA PRODUTO -->
<div id="produto" class="pagina">

<button class="voltar" onclick="ir('catalogo')">⬅ Voltar</button>

<div id="produtoInfo"></div>

</div>

<!-- CARRINHO -->
<div id="carrinho">

<button onclick="toggleCarrinho()">❌ Fechar</button>

<h2>🛒 Carrinho</h2>

<div id="itens"></div>

<h3>Total: R$ <span id="total">0</span></h3>

<select id="pagamento">
<option>Pix</option>
<option>Presencial</option>
</select>

<input id="whats" placeholder="WhatsApp">

<button onclick="finalizar()">Finalizar</button>

</div>

<!-- KIT MODAL -->
<div id="modalKit" class="pagina">

<button class="voltar" onclick="fecharKit()">⬅ Voltar</button>

<h2>Montar Kit</h2>

<select id="kitCubo">
<option value="">Cubo *</option>
<option value="21.99">Básico</option>
<option value="59.90">Magnético</option>
</select>

<select id="kitBag">
<option value="">Bag *</option>
<option value="10">Simples</option>
<option value="20">Premium</option>
</select>

<select id="kitStand">
<option value="">Stand *</option>
<option value="5">Básico</option>
<option value="10">Premium</option>
</select>

<label><input type="checkbox" id="kitLub"> Lub (+2)</label>

<button onclick="confirmarKit()">Adicionar Kit</button>

</div>

<script>

let carrinho=[];
let total=0;

/* NAVEGAÇÃO */
function ir(p){
document.querySelectorAll(".pagina").forEach(e=>e.classList.remove("ativa"));
document.getElementById(p).classList.add("ativa");
}

/* PRODUTO DETALHE */
function verProduto(tipo){

let html="";

if(tipo==="basico"){
html=`
<img src="https://via.placeholder.com/300" style="width:100%">
<h2>Cubo Básico</h2>
<p>Ótimo para iniciantes.</p>
<p>R$21.99</p>
<button onclick="add('Cubo Básico',21.99)">Adicionar</button>
`;
}

if(tipo==="magnetico"){
html=`
<img src="https://via.placeholder.com/300" style="width:100%">
<h2>Cubo Magnético</h2>
<p>Alta performance.</p>
<p>R$59.90</p>
<button onclick="add('Cubo Magnético',59.90)">Adicionar</button>
`;
}

document.getElementById("produtoInfo").innerHTML=html;

ir("produto");
}

/* CARRINHO */
function toggleCarrinho(){
document.getElementById("carrinho").classList.toggle("ativo");
}

/* ADD */
function add(n,p){
carrinho.push({n,p});
total+=p;
atualizar();
}

/* ATUALIZAR */
function atualizar(){
let html="";
carrinho.forEach((item,i)=>{
html+=`
<div class="item">
<span>${item.n}</span>
<span>R$ ${item.p}</span>
<button onclick="remover(${i})">❌</button>
</div>`;
});
document.getElementById("itens").innerHTML=html;
document.getElementById("total").innerText=total.toFixed(2);
}

/* REMOVER */
function remover(i){
total-=carrinho[i].p;
carrinho.splice(i,1);
atualizar();
}

/* FINALIZAR */
function finalizar(){

let whats=document.getElementById("whats").value;

if(carrinho.length==0){
alert("Carrinho vazio!");
return;
}

if(!whats){
alert("Preencha o WhatsApp!");
return;
}

alert("Pedido enviado!");
carrinho=[];
total=0;
atualizar();
}

/* KIT */
function abrirKit(){
ir("modalKit");
}

function fecharKit(){
ir("catalogo");
}

function confirmarKit(){

let c=document.getElementById("kitCubo").value;
let b=document.getElementById("kitBag").value;
let s=document.getElementById("kitStand").value;

if(!c||!b||!s){
alert("Complete os obrigatórios!");
return;
}

let totalKit=Number(c)+Number(b)+Number(s);

if(document.getElementById("kitLub").checked) totalKit+=2;

totalKit*=0.95;

add("Kit Completo",Number(totalKit.toFixed(2)));

alert("Kit com desconto adicionado!");

ir("catalogo");
}

</script>

</body>
</html>
